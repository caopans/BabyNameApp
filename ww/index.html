<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝起名 - 给宝宝最好的礼物</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            pink: '#FFB6C1',
                            blue: '#87CEFA',
                            gold: '#FFD700',
                            light: '#FFF0F5',
                            dark: '#4682B4'
                        },
                        secondary: {
                            green: '#98FB98',
                            purple: '#DDA0DD',
                            orange: '#FFA500',
                            red: '#FF6B6B',
                            yellow: '#FFDAB9'
                        },
                        neutral: {
                            light: '#F5F5F5',
                            medium: '#666666',
                            dark: '#333333'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'serif']
                    },
                    boxShadow: {
                        'card': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                        'card-hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                        'button': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'button-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)'
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'slide-down': 'slideDown 0.5s ease-out forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'fade-out': 'fadeOut 0.5s ease-out forwards',
                        'scale-in': 'scaleIn 0.3s ease-out forwards',
                        'scale-out': 'scaleOut 0.3s ease-out forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' }
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.95)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        scaleOut: {
                            '0%': { transform: 'scale(1)', opacity: '1' },
                            '100%': { transform: 'scale(0.95)', opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            }
            .text-shadow-lg {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                background-image: linear-gradient(to right, #FFB6C1, #87CEFA);
            }
            .text-gradient-gold {
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                background-image: linear-gradient(to right, #FFD700, #FFA500);
            }
            .bg-blur {
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .card-shadow {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
                transition: box-shadow 0.3s ease, transform 0.3s ease;
            }
            .card-shadow:hover {
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
                transform: translateY(-5px);
            }
            .ripple {
                position: relative;
                overflow: hidden;
            }
            .ripple:after {
                content: "";
                display: block;
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                pointer-events: none;
                background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
                background-repeat: no-repeat;
                background-position: 50%;
                transform: scale(10, 10);
                opacity: 0;
                transition: transform 0.5s, opacity 0.8s;
            }
            .ripple:active:after {
                transform: scale(0, 0);
                opacity: 0.3;
                transition: 0s;
            }
            .five-elements-icon {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                margin: 0 5px;
            }
            .element-wood {
                background-color: #98FB98;
                color: #2E8B57;
            }
            .element-fire {
                background-color: #FF6B6B;
                color: #8B0000;
            }
            .element-earth {
                background-color: #D2B48C;
                color: #8B4513;
            }
            .element-metal {
                background-color: #B0C4DE;
                color: #4682B4;
            }
            .element-water {
                background-color: #87CEFA;
                color: #0000CD;
            }
            .gender-icon {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }
            .gender-boy {
                background-color: #87CEFA;
                color: #0000CD;
            }
            .gender-girl {
                background-color: #FFB6C1;
                color: #8B008B;
            }
            .name-card {
                transition: all 0.3s ease;
                transform-style: preserve-3d;
                position: relative;
                height: 120px;
            }
            .name-card:hover {
                transform: translateY(-5px);
            }
            .name-card-front, .name-card-back {
                backface-visibility: hidden;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border-radius: 16px;
            }
            .name-card-back {
                transform: rotateY(180deg);
                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            }
            .name-card.flipped {
                transform: rotateY(180deg);
            }
            .tab-indicator {
                position: absolute;
                bottom: 0;
                height: 3px;
                background-color: #FFD700;
                transition: all 0.3s ease;
            }
            .filter-chip {
                transition: all 0.2s ease;
            }
            .filter-chip.active {
                background-color: #FFD700;
                color: #333;
                transform: scale(1.05);
            }
            .fab {
                transition: all 0.3s ease;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .fab:hover {
                transform: rotate(90deg) scale(1.1);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .rating-star {
                color: #FFD700;
                transition: all 0.2s ease;
            }
            .rating-star:hover {
                transform: scale(1.2);
            }
            .progress-ring {
                transform: rotate(-90deg);
            }
            .progress-ring-circle {
                transition: stroke-dashoffset 0.5s ease;
                transform-origin: center;
            }
        }
    </style>
</head>
<body class="bg-neutral-light font-sans text-neutral-dark overflow-x-hidden">
    <!-- 应用背景 -->
    <div class="fixed inset-0 z-0 opacity-10 pointer-events-none">
        <img src="https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/448bb57e3caa42ca93372204649271f3~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=20260306093535BD0527B1CE024DF48481&rrcfp=f06b921b&x-expires=1775352996&x-signature=MnUAxTbZPCMILyyAktiER3Exsyk%3D" 
             alt="背景" class="w-full h-full object-cover">
    </div>

    <!-- 主容器 -->
    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- 顶部导航栏 -->
        <header class="bg-white bg-opacity-90 shadow-md sticky top-0 z-50 bg-blur">
            <div class="container mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center">
                    <img src="https://p26-doubao-search-sign.byteimg.com/tos-cn-i-be4g95zd3a/1697242638788722701~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1788312976&x-signature=ha0GNm6IoZUDnzRqRGnEgYXThbI%3D" 
                         alt="宝宝起名" class="w-10 h-10 rounded-full mr-3">
                    <h1 class="text-xl font-bold text-gradient">宝宝起名</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="searchBtn" class="p-2 rounded-full hover:bg-neutral-light transition-colors">
                        <i class="fa fa-search text-neutral-medium"></i>
                    </button>
                    <button id="filterBtn" class="p-2 rounded-full hover:bg-neutral-light transition-colors">
                        <i class="fa fa-filter text-neutral-medium"></i>
                    </button>
                    <button id="settingsBtn" class="p-2 rounded-full hover:bg-neutral-light transition-colors">
                        <i class="fa fa-cog text-neutral-medium"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="flex-1 container mx-auto px-4 py-6">
            <!-- 标签页导航 -->
            <div class="relative mb-6 bg-white rounded-full shadow-md p-1 inline-flex">
                <button class="tab-btn active px-6 py-2 rounded-full relative z-10 transition-colors" data-tab="all">
                    全部
                </button>
                <button class="tab-btn px-6 py-2 rounded-full relative z-10 transition-colors" data-tab="boy">
                    男孩
                </button>
                <button class="tab-btn px-6 py-2 rounded-full relative z-10 transition-colors" data-tab="girl">
                    女孩
                </button>
                <div class="tab-indicator left-1 w-[calc(33.33%-8px)] rounded-full"></div>
            </div>

            <!-- 筛选条件栏 -->
            <div class="mb-6 overflow-x-auto scrollbar-hide">
                <div class="flex space-x-3 pb-2">
                    <div class="filter-chip active px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span>全部五行</span>
                    </div>
                    <div class="filter-chip px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span class="element-wood mr-1 w-4 h-4 rounded-full inline-flex items-center justify-center text-xs">木</span>
                        <span>木</span>
                    </div>
                    <div class="filter-chip px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span class="element-fire mr-1 w-4 h-4 rounded-full inline-flex items-center justify-center text-xs">火</span>
                        <span>火</span>
                    </div>
                    <div class="filter-chip px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span class="element-earth mr-1 w-4 h-4 rounded-full inline-flex items-center justify-center text-xs">土</span>
                        <span>土</span>
                    </div>
                    <div class="filter-chip px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span class="element-metal mr-1 w-4 h-4 rounded-full inline-flex items-center justify-center text-xs">金</span>
                        <span>金</span>
                    </div>
                    <div class="filter-chip px-4 py-2 bg-white rounded-full shadow-sm text-sm flex items-center">
                        <span class="element-water mr-1 w-4 h-4 rounded-full inline-flex items-center justify-center text-xs">水</span>
                        <span>水</span>
                    </div>
                </div>
            </div>

            <!-- 名字列表 -->
            <div class="space-y-4 mb-20" id="nameList">
                <!-- 名字卡片将通过JavaScript动态生成 -->
            </div>

            <!-- 加载更多 -->
            <div class="text-center py-4">
                <button id="loadMoreBtn" class="px-6 py-2 bg-primary-gold text-neutral-dark rounded-full shadow-button hover:shadow-button-hover transition-all ripple">
                    加载更多
                </button>
            </div>
        </main>

        <!-- 底部导航栏 -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white bg-opacity-90 shadow-lg z-50 bg-blur">
            <div class="container mx-auto px-4 py-3">
                <div class="flex justify-around">
                    <button class="nav-btn active flex flex-col items-center p-2 w-1/3">
                        <i class="fa fa-home text-xl"></i>
                        <span class="text-xs mt-1">首页</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center p-2 w-1/3">
                        <i class="fa fa-heart-o text-xl"></i>
                        <span class="text-xs mt-1">收藏</span>

                    <button class="nav-btn flex flex-col items-center p-2 w-1/3">

                    </button>
                </div>
            </div>
        </nav>

        <!-- 浮动操作按钮 -->
        <button id="randomNameBtn" class="fab fixed right-6 bottom-24 w-14 h-14 bg-primary-gold rounded-full flex items-center justify-center shadow-lg z-40 ripple">
            <i class="fa fa-random text-white text-xl"></i>
        </button>

        <!-- 筛选面板 (默认隐藏) -->
        <div id="filterPanel" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">

                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="gender" value="all" checked class="hidden">
                                <span class="w-12 h-12 rounded-full border-2 border-primary-gold flex items-center justify-center mr-2 transition-all">
                                    <i class="fa fa-child text-primary-gold"></i>
                                </span>
                                <span>全部</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="gender" value="boy" class="hidden">
                                <span class="w-12 h-12 rounded-full border-2 border-primary-blue flex items-center justify-center mr-2 transition-all">
                                    <i class="fa fa-mars text-primary-blue"></i>
                                </span>
                                <span>男孩</span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="radio" name="gender" value="girl" class="hidden">
                                <span class="w-12 h-12 rounded-full border-2 border-primary-pink flex items-center justify-center mr-2 transition-all">
                                    <i class="fa fa-venus text-primary-pink"></i>
                                </span>
                                <span>女孩</span>
                            </label>
                        </div>
                    </div>

                    <!-- 五行属性 -->
                    <div class="mb-6">
                        <h3 class="text-lg font-semibold mb-3">五行属性</h3>
                        <div class="flex flex-wrap gap-3">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" name="element" value="wood" class="hidden">
                                <span class="px-4 py-2 rounded-full border-2 border-element-wood flex items-center transition-all">
                                    <span class="element-wood mr-2 w-6 h-6 rounded-full inline-flex items-center justify-center">木</span>
                                    <span>木</span>
                                </span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" name="element" value="fire" class="hidden">
                                <span class="px-4 py-2 rounded-full border-2 border-element-fire flex items-center transition-all">
                                    <span class="element-fire mr-2 w-6 h-6 rounded-full inline-flex items-center justify-center">火</span>
                                    <span>火</span>
                                </span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" name="element" value="earth" class="hidden">
                                <span class="px-4 py-2 rounded-full border-2 border-element-earth flex items-center transition-all">
                                    <span class="element-earth mr-2 w-6 h-6 rounded-full inline-flex items-center justify-center">土</span>
                                    <span>土</span>
                                </span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" name="element" value="metal" class="hidden">
                                <span class="px-4 py-2 rounded-full border-2 border-element-metal flex items-center transition-all">
                                    <span class="element-metal mr-2 w-6 h-6 rounded-full inline-flex items-center justify-center">金</span>
                                    <span>金</span>
                                </span>
                            </label>
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" name="element" value="water" class="hidden">
                                <span class="px-4 py-2 rounded-full border-2 border-element-water flex items-center transition-all">
                                    <span class="element-water mr-2 w-6 h-6 rounded-full inline-flex items-center justify-center">水</span>
                                    <span>水</span>
                                </span>
                            </label>
                        </div>
                    </div>

                    <!-- 笔画数范围 -->
                    <div class="mb-6">
                        <h3 class="text-lg font-semibold mb-3">笔画数范围</h3>
                        <div class="px-2">
                            <div class="flex justify-between mb-2">
                                <span id="strokeMin">2</span>
                                <span id="strokeMax">30</span>
                            </div>
                            <input type="range" min="2" max="30" value="2" class="w-full h-2 bg-neutral-light rounded-lg appearance-none cursor-pointer" id="strokeMinRange">
                            <input type="range" min="2" max="30" value="30" class="w-full h-2 bg-neutral-light rounded-lg appearance-none cursor-pointer mt-2" id="strokeMaxRange">
                        </div>
                    </div>

                    <!-- 寓意关键词 -->

                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">勇敢</span>
                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">吉祥</span>
                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">富贵</span>
                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">健康</span>
                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">美丽</span>
                            <span class="px-3 py-1 bg-neutral-light rounded-full text-sm cursor-pointer hover:bg-primary-gold hover:text-white transition-colors">才华</span>

                        <div class="relative">

                            <button class="absolute right-2 top-1/2 transform -translate-y-1/2 px-3 py-1 bg-primary-gold text-white rounded-full text-sm">添加</button>
                        </div>
                    </div>

                    <!-- 按钮组 -->
                    <div class="flex space-x-4">
                        <button id="resetFilterBtn" class="flex-1 py-3 bg-neutral-light rounded-full text-neutral-medium font-semibold hover:bg-gray-300 transition-colors">重置</button>

                    </div>
                </div>
            </div>
        </div>

        <!-- 名字详情面板 (默认隐藏) -->
        <div id="nameDetailPanel" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="bg-white rounded-t-3xl absolute bottom-0 left-0 right-0 max-h-[90vh] overflow-y-auto animate-slide-up">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">名字详情</h2>
                        <button id="closeDetailBtn" class="p-2 rounded-full hover:bg-neutral-light">
                            <i class="fa fa-times"></i>
                        </button>
                    </div>

                    <div id="nameDetailContent">

                    </div>
                </div>
            </div>
        </div>

        <!-- AI推荐面板 (默认隐藏) -->
        <div id="aiRecommendPanel" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="bg-white rounded-t-3xl absolute bottom-0 left-0 right-0 max-h-[80vh] overflow-y-auto animate-slide-up">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold flex items-center">
                            <i class="fa fa-magic text-primary-gold mr-2"></i>
                            AI智能推荐
                        </h2>
                        <button id="closeAiBtn" class="p-2 rounded-full hover:bg-neutral-light">
                            <i class="fa fa-times"></i>
                        </button>

                    return false;

                // 五行筛选
                if (currentFilters.element !== 'all' && name.element !== currentFilters.element) {
                    return false;
                }
                
                // 笔画数筛选
                if (name.strokes < currentFilters.strokes.min || name.strokes > currentFilters.strokes.max) {
                    return false;
                }
                
                // 标签筛选
                if (currentFilters.tags.length > 0) {
                    const hasMatchingTag = currentFilters.tags.some(tag => name.tags.includes(tag));
                    if (!hasMatchingTag) {
                        return false;
                    }
                }
                
                return true;
            });

                const tagSpan = document.createElement('span');
                tagSpan.className = 'px-2 py-1 bg-neutral-light rounded-full text-xs';
                tagSpan.textContent = tag;
                tags.appendChild(tagSpan);
            });
            
            middle.appendChild(meaning);
            middle.appendChild(tags);
            
            // 卡片底部
            const footer = document.createElement('div');
            footer.className = 'flex justify-between items-center mt-3';
            
            // 五行和笔画
            const info = document.createElement('div');
            info.className = 'flex items-center';
            
            const elementIcon = document.createElement('div');
            elementIcon.className = `five-elements-icon element-${name.element} mr-3`;
            elementIcon.textContent = getElementCharacter(name.element);
            
            const strokes = document.createElement('span');
            strokes.className = 'text-sm text-neutral-medium';
            strokes.textContent = `${name.strokes}画`;
            
            info.appendChild(elementIcon);
            info.appendChild(strokes);
            
            // 评分
            const rating = document.createElement('div');
            rating.className = 'flex items-center';
            
            const stars = document.createElement('div');
            stars.className = 'flex mr-1';
            
            // 添加星星
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('i');
                star.className = i < Math.floor(name.rating) ? 'fa fa-star rating-star' : (i < name.rating ? 'fa fa-star-half-o rating-star' : 'fa fa-star-o text-neutral-medium');
                stars.appendChild(star);
            }
            
            const ratingText = document.createElement('span');
            ratingText.className = 'text-sm';
            ratingText.textContent = name.rating.toFixed(1);
            
            rating.appendChild(stars);
            rating.appendChild(ratingText);
            
            footer.appendChild(info);
            footer.appendChild(rating);
            
            // 组装卡片正面
            front.appendChild(header);
            front.appendChild(middle);
            front.appendChild(footer);
            
            // 添加点击事件
            front.addEventListener('click', () => {
                showNameDetail(name);
            });
            
            // 组装卡片
            card.appendChild(front);
            
            return card;
        }

        // 显示名字详情
        function showNameDetail(name) {
            // 清空详情内容
            nameDetailContent.innerHTML = '';
            
            // 创建详情内容
            const content = document.createElement('div');
            
            // 名字和基本信息
            const header = document.createElement('div');
            header.className = 'text-center mb-6';
            
            const nameTitle = document.createElement('h2');
            nameTitle.className = 'text-3xl font-bold mb-2';
            nameTitle.textContent = name.name;
            
            const genderIcon = document.createElement('div');
            genderIcon.className = `gender-icon ${name.gender === 'boy' ? 'gender-boy' : 'gender-girl'} mx-auto mb-3`;
            genderIcon.innerHTML = name.gender === 'boy' ? '<i class="fa fa-mars"></i>' : '<i class="fa fa-venus"></i>';
            
            const meaning = document.createElement('p');
            meaning.className = 'text-lg text-neutral-medium';
            meaning.textContent = name.meaning;
            
            header.appendChild(nameTitle);
            header.appendChild(genderIcon);
            header.appendChild(meaning);
            
            // 标签
            const tags = document.createElement('div');
            tags.className = 'flex justify-center flex-wrap gap-2 mb-6';
            
            name.tags.forEach(tag => {
                const tagSpan = document.createElement('span');
                tagSpan.className = 'px-3 py-1 bg-neutral-light rounded-full text-sm';
                tagSpan.textContent = tag;
                tags.appendChild(tagSpan);
            });
            
            // 五格分析
            const五格Section = document.createElement('div');
           五格Section.className = 'mb-6';
            
            const五格Title = document.createElement('h3');
           五格Title.className = 'text-lg font-semibold mb-3';
           五格Title.textContent = '五格分析';
            
            const五格Chart = document.createElement('div');
           五格Chart.className = 'mb-4';
           五格Chart.innerHTML = `<canvas id="personalityChart" height="200"></canvas>`;
            
            const五格Details = document.createElement('div');
           五格Details.className = 'grid grid-cols-2 gap-2';
            
            const五格Data = name.analysis五格;
            const五格Labels = {
                personality: '人格',
                career: '事业',
                health: '健康',
                family: '家庭',
                wealth: '财运'
            };
            
            for (const [key, value] of Object.entries(五格Data)) {
                const item = document.createElement('div');
                item.className = 'flex justify-between items-center';
                
                const label = document.createElement('span');
                label.className = 'text-sm';
                label.textContent = 五格Labels[key];
                
                const progress = document.createElement('div');
                progress.className = 'w-1/2 h-2 bg-neutral-light rounded-full overflow-hidden';
                
                const progressBar = document.createElement('div');
                progressBar.className = 'h-full bg-primary-gold transition-all duration-1000 ease-out';
                progressBar.style.width = '0%';
                
                progress.appendChild(progressBar);
                item.appendChild(label);
                item.appendChild(progress);
               五格Details.appendChild(item);
                
                // 动画显示进度条
                setTimeout(() => {
                    progressBar.style.width = `${value}%`;
                }, 100);
            }
            
            五格Section.appendChild(五格Title);
            五格Section.appendChild(五格Chart);
            五格Section.appendChild(五格Details);
            
            // 五行属性
            const fiveElementsSection = document.createElement('div');
            fiveElementsSection.className = 'mb-6';
            
            const fiveElementsTitle = document.createElement('h3');
            fiveElementsTitle.className = 'text-lg font-semibold mb-3';
            fiveElementsTitle.textContent = '五行属性';
            
            const fiveElementsChart = document.createElement('div');
            fiveElementsChart.className = 'flex justify-center mb-4';
            fiveElementsChart.innerHTML = `<canvas id="elementsChart" height="200"></canvas>`;
            
            fiveElementsSection.appendChild(fiveElementsTitle);
            fiveElementsSection.appendChild(fiveElementsChart);
            
            // 详细寓意
            const detailedMeaningSection = document.createElement('div');
            detailedMeaningSection.className = 'mb-6';
            
            const detailedMeaningTitle = document.createElement('h3');
            detailedMeaningTitle.className = 'text-lg font-semibold mb-3';
            detailedMeaningTitle.textContent = '详细寓意';
            
            const detailedMeaningText = document.createElement('p');
            detailedMeaningText.className = 'text-neutral-medium bg-neutral-light p-4 rounded-xl';
            detailedMeaningText.textContent = name.analysis.detailedMeaning;
            
            detailedMeaningSection.appendChild(detailedMeaningTitle);
            detailedMeaningSection.appendChild(detailedMeaningText);
            
            // 操作按钮
            const actions = document.createElement('div');
            actions.className = 'flex space-x-4';
            
            const favoriteBtn = document.createElement('button');
            favoriteBtn.className = 'flex-1 py-3 bg-primary-pink text-white rounded-full font-semibold hover:bg-pink-500 transition-colors shadow-button ripple flex items-center justify-center';
            favoriteBtn.innerHTML = '<i class="fa fa-heart mr-2"></i> 收藏';
            
            const shareBtn = document.createElement('button');
            shareBtn.className = 'flex-1 py-3 bg-primary-blue text-white rounded-full font-semibold hover:bg-blue-500 transition-colors shadow-button ripple flex items-center justify-center';
            shareBtn.innerHTML = '<i class="fa fa-share-alt mr-2"></i> 分享';
            
            actions.appendChild(favoriteBtn);
            actions.appendChild(shareBtn);
            
            // 组装详情内容
            content.appendChild(header);
            content.appendChild(tags);
            content.appendChild(五格Section);
            content.appendChild(fiveElementsSection);
            content.appendChild(detailedMeaningSection);
            content.appendChild(actions);
            
            nameDetailContent.appendChild(content);
            
            // 显示详情面板
            nameDetailPanel.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // 渲染图表
            setTimeout(() => {
                renderPersonalityChart(name.analysis五格);
                renderElementsChart(name.analysis.fiveElements);
            }, 100);
        }

        // 渲染人格分析图表
        function renderPersonalityChart(data) {
            const ctx = document.getElementById('personalityChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['人格', '事业', '健康', '家庭', '财运'],
                    datasets: [{
                        label: '评分',
                        data: Object.values(data),
                        backgroundColor: 'rgba(255, 215, 0, 0.2)',
                        borderColor: 'rgba(255, 215, 0, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(255, 215, 0, 1)',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: 'rgba(255, 215, 0, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // 渲染五行属性图表
        function renderElementsChart(data) {
            const ctx = document.getElementById('elementsChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['木', '火', '土', '金', '水'],
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: [
                            'rgba(152, 251, 152, 0.8)',
                            'rgba(255, 107, 107, 0.8)',
                            'rgba(210, 180, 140, 0.8)',
                            'rgba(176, 196, 222, 0.8)',
                            'rgba(135, 206, 250, 0.8)'
                        ],
                        borderColor: [
                            'rgba(152, 251, 152, 1)',
                            'rgba(255, 107, 107, 1)',
                            'rgba(210, 180, 140, 1)',
                            'rgba(176, 196, 222, 1)',
                            'rgba(135, 206, 250, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    },
                    animation: {
                        animateRotate: true,
                        animateScale: true,
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        // 切换收藏状态
        function toggleFavorite(btn) {
            const icon = btn.querySelector('i');
            
            if (icon.classList.contains('fa-heart-o')) {
                icon.classList.remove('fa-heart-o');
                icon.classList.add('fa-heart');
                icon.classList.add('text-primary-pink');
                icon.classList.remove('text-neutral-medium');
                
                // 添加动画
                icon.classList.add('animate-bounce');
                setTimeout(() => {
                    icon.classList.remove('animate-bounce');
                }, 1000);
            } else {
                icon.classList.remove('fa-heart');
                icon.classList.add('fa-heart-o');
                icon.classList.remove('text-primary-pink');
                icon.classList.add('text-neutral-medium');
            }
        }

        // 生成随机名字
        function generateRandomName() {
            // 显示加载动画
            randomNameBtn.innerHTML = '<i class="fa fa-spinner fa-spin text-white text-xl"></i>';
            randomNameBtn.disabled = true;
            
            // 模拟加载延迟
            setTimeout(() => {
                // 随机选择一个名字
                const randomIndex = Math.floor(Math.random() * nameDatabase.length);
                const randomName = nameDatabase[randomIndex];
                
                // 显示名字详情
                showNameDetail(randomName);
                
                // 恢复按钮状态
                randomNameBtn.innerHTML = '<i class="fa fa-random text-white text-xl"></i>';
                randomNameBtn.disabled = false;
            }, 1000);
        }

        // 应用筛选条件
        function applyFilters() {
            // 获取性别筛选
            const genderRadios = document.querySelectorAll('input[name="gender"]');
            for (const radio of genderRadios) {
                if (radio.checked) {
                    currentFilters.gender = radio.value;
                    break;
                }
            }
            
            // 获取五行筛选
            const elementCheckboxes = document.querySelectorAll('input[name="element"]');
            const selectedElements = [];
            for (const checkbox of elementCheckboxes) {
                if (checkbox.checked) {
                    selectedElements.push(checkbox.value);
                }
            }
            
            if (selectedElements.length === 0) {
                currentFilters.element = 'all';
            } else if (selectedElements.length === 1) {
                currentFilters.element = selectedElements[0];
            } else {
                // 如果选择了多个五行，需要特殊处理
                // 这里简化处理，实际应用中可能需要更复杂的逻辑
                currentFilters.element = 'all';
            }
            
            // 获取笔画数范围
            const strokeMinRange = document.getElementById('strokeMinRange');
            const strokeMaxRange = document.getElementById('strokeMaxRange');
            
            currentFilters.strokes.min = parseInt(strokeMinRange.value);
            currentFilters.strokes.max = parseInt(strokeMaxRange.value);
            
            // 重新加载名字
            reloadNames();
        }

        // 重置筛选条件
        function resetFilters() {
            // 重置性别筛选
            document.querySelector('input[name="gender"][value="all"]').checked = true;
            
            // 重置五行筛选
            document.querySelectorAll('input[name="element"]').forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // 重置笔画数范围
            document.getElementById('strokeMinRange').value = 2;
            document.getElementById('strokeMaxRange').value = 30;
            document.getElementById('strokeMin').textContent = '2';
            document.getElementById('strokeMax').textContent = '30';
            
            // 重置筛选条件对象
            currentFilters = {
                gender: 'all',
                element: 'all',
                strokes: {
                    min: 2,
                    max: 30
                },
                tags: []
            };
        }

        // 更新标签页指示器
        function updateTabIndicator(index) {
            const tabWidth = tabBtns[index].offsetWidth;
            const tabLeft = tabBtns[index].offsetLeft;
            
            tabIndicator.style.width = `${tabWidth}px`;
            tabIndicator.style.left = `${tabLeft}px`;
        }

        // 处理导航逻辑
        function handleNavigation(index) {
            switch (index) {
                case 0: // 首页
                    // 已经在首页，无需操作
                    break;
                case 1: // 收藏
                    // 显示收藏页面
                    showToast('收藏功能即将上线，敬请期待！');
                    break;
                case 2: // 我的
                    // 显示AI推荐面板
                    aiRecommendPanel.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                    break;
            }
        }

        // 生成AI推荐
        function generateAiRecommendations() {
            // 显示加载动画
            generateAiNamesBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 正在生成...';
            generateAiNamesBtn.disabled = true;
            
            // 模拟加载延迟
            setTimeout(() => {
                // 清空AI推荐列表
                aiNameList.innerHTML = '';
                
                // 添加AI推荐的名字
                aiRecommendedNames.forEach(name => {
                    const nameItem = document.createElement('div');
                    nameItem.className = 'bg-white rounded-xl shadow-sm p-4 mb-4';
                    
                    const nameHeader = document.createElement('div');
                    nameHeader.className = 'flex justify-between items-center mb-2';
                    
                    const nameText = document.createElement('h4');
                    nameText.className = 'text-xl font-bold';
                    nameText.textContent = name.name;
                    
                    const matchScore = document.createElement('div');
                    matchScore.className = 'flex items-center';
                    
                    const scoreText = document.createElement('span');
                    scoreText.className = 'text-sm text-primary-gold font-semibold mr-1';
                    scoreText.textContent = `${name.matchScore}%`;
                    
                    const scoreBar = document.createElement('div');
                    scoreBar.className = 'w-20 h-2 bg-neutral-light rounded-full overflow-hidden';
                    
                    const scoreProgress = document.createElement('div');
                    scoreProgress.className = 'h-full bg-primary-gold transition-all duration-1000 ease-out';
                    scoreProgress.style.width = '0%';
                    
                    scoreBar.appendChild(scoreProgress);
                    matchScore.appendChild(scoreText);
                    matchScore.appendChild(scoreBar);
                    
                    nameHeader.appendChild(nameText);
                    nameHeader.appendChild(matchScore);
                    
                    const nameInfo = document.createElement('div');
                    nameInfo.className = 'flex items-center text-sm text-neutral-medium mb-2';
                    
                    const genderIcon = document.createElement('div');
                    genderIcon.className = name.gender === 'boy' ? 'gender-icon gender-boy mr-2' : 'gender-icon gender-girl mr-2';
                    genderIcon.innerHTML = name.gender === 'boy' ? '<i class="fa fa-mars"></i>' : '<i class="fa fa-venus"></i>';
                    
                    const elementIcon = document.createElement('div');
                    elementIcon.className = `five-elements-icon element-${name.element} mr-2`;
                    elementIcon.textContent = getElementCharacter(name.element);
                    
                    const strokes = document.createElement('span');
                    strokes.textContent = `${name.strokes}画`;
                    
                    nameInfo.appendChild(genderIcon);
                    nameInfo.appendChild(elementIcon);
                    nameInfo.appendChild(strokes);
                    
                    const meaning = document.createElement('p');
                    meaning.className = 'text-sm mb-2';
                    meaning.textContent = name.meaning;
                    
                    const tags = document.createElement('div');
                    tags.className = 'flex flex-wrap gap-1';
                    
                    name.tags.forEach(tag => {
                        const tagSpan = document.createElement('span');
                        tagSpan.className = 'px-2 py-1 bg-neutral-light rounded-full text-xs';
                        tagSpan.textContent = tag;
                        tags.appendChild(tagSpan);
                    });
                    
                    const actions = document.createElement('div');
                    actions.className = 'flex justify-end mt-2';
                    
                    const detailBtn = document.createElement('button');
                    detailBtn.className = 'px-3 py-1 bg-primary-gold text-white rounded-full text-sm mr-2 hover:bg-yellow-500 transition-colors';
                    detailBtn.textContent = '查看详情';
                    detailBtn.addEventListener('click', () => {
                        // 查找对应的名字详情
                        const fullName = nameDatabase.find(n => n.name === name.name) || name;
                        showNameDetail(fullName);
                        aiRecommendPanel.classList.add('hidden');
                    });
                    
                    const saveBtn = document.createElement('button');
                    saveBtn.className = 'px-3 py-1 bg-primary-pink text-white rounded-full text-sm hover:bg-pink-500 transition-colors';
                    saveBtn.textContent = '收藏';
                    
                    actions.appendChild(detailBtn);
                    actions.appendChild(saveBtn);
                    
                    nameItem.appendChild(nameHeader);
                    nameItem.appendChild(nameInfo);
                    nameItem.appendChild(meaning);
                    nameItem.appendChild(tags);
                    nameItem.appendChild(actions);
                    
                    aiNameList.appendChild(nameItem);
                    
                    // 动画显示进度条
                    setTimeout(() => {
                        scoreProgress.style.width = `${name.matchScore}%`;
                    }, 100);
                });
                
                // 设置推荐理由
                aiReason.textContent = "根据您提供的信息，我们的AI系统分析了父母姓名的五行属性和宝宝的出生八字，为您推荐了以上最匹配的名字。这些名字不仅在音韵上和谐动听，在寓意上也非常美好，能够助力宝宝健康成长，学业有成，将来必能成为人中龙凤。";
                
                // 显示AI结果
                aiResults.classList.remove('hidden');
                
                // 恢复按钮状态
                generateAiNamesBtn.innerHTML = '<i class="fa fa-magic mr-2"></i> 重新生成';
                generateAiNamesBtn.disabled = false;
            }, 2000);
        }

        // 获取五行字符
        function getElementCharacter(element) {
            const elements = {
                wood: '木',
                fire: '火',
                earth: '土',
                metal: '金',
                water: '水'
            };
            
            return elements[element] || '';
        }

        // 根据文本获取五行
        function getElementFromText(text) {
            const elements = {
                '木': 'wood',
                '火': 'fire',
                '土': 'earth',
                '金': 'metal',
                '水': 'water'
            };
            
            return elements[text] || 'all';
        }

        // 显示提示信息
        function showToast(message) {
            // 创建提示元素
            const toast = document.createElement('div');
            toast.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-neutral-dark text-white px-4 py-2 rounded-lg shadow-lg z-50 animate-fade-in';
            toast.textContent = message;
            
            // 添加到页面
            document.body.appendChild(toast);
            
            // 2秒后移除
            setTimeout(() => {
                toast.classList.add('animate-fade-out');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 500);
            }, 2000);
        }
    </script>
