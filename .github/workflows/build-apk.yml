name: 自动构建宝宝起名APP APK

# 触发条件：提交代码到main分支，或手动触发
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手动触发开关

jobs:
  build:
    runs-on: ubuntu-latest # 使用Ubuntu云服务器构建

    steps:
      # 步骤1：拉取GitHub仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤2：安装Node.js（Cordova依赖）
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 稳定版Node.js

      # 步骤3：安装Cordova
      - name: 安装Cordova
        run: npm install -g cordova

      # 步骤4：创建Cordova项目并整合代码
      - name: 构建Cordova项目
        run: |
          # 创建空的Cordova项目
          cordova create temp-app com.babynamer.app "宝宝起名"
          # 复制配置文件和前端代码到Cordova项目
          cp config.xml temp-app/
          rm -rf temp-app/www/*
          cp -r www/* temp-app/www/
          # 进入项目目录，添加Android平台
          cd temp-app
          cordova platform add android@12.0.0 # 指定稳定版Android平台
          # 安装必要插件
          cordova plugin add cordova-plugin-nativestorage cordova-plugin-x-socialsharing cordova-plugin-statusbar

      # 步骤5：构建APK（调试版，可直接安装）
      - name: 编译APK
        run: |
          cd temp-app
          cordova build android --debug # 调试版APK（无需签名，可直接安装）

      # 步骤6：上传APK作为构建产物（可下载）
      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: 宝宝起名APP-APK
          path: temp-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk # APK生成路径
