name: 自动构建宝宝起名APP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 关键：强制使用Gradle 7.5（与Cordova兼容）
      GRADLE_VERSION: 7.5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 安装兼容版Gradle
      - name: 安装Gradle 7.5
        run: |
          wget https://services.gradle.org/distributions/gradle-7.5-bin.zip -P /tmp
          unzip -q /tmp/gradle-7.5-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.5/bin" >> $GITHUB_PATH

      - name: 安装JDK 11（与Gradle 7.5匹配）
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 安装Cordova
        run: npm install -g cordova@11.1.0

      - name: 构建项目（跳过Gradle自动下载）
        run: |
          cordova create temp-app com.babynamer.app "宝宝起名"
          cp config.xml temp-app/ || true
          rm -rf temp-app/www/*
          cp -r www/* temp-app/www/ || true
          cd temp-app
          cordova platform add android@10.1.2
          # 强制指定Gradle版本
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip" > platforms/android/gradle/wrapper/gradle-wrapper.properties

      - name: 编译APK
        run: |
          cd temp-app
          cordova build android --debug -- --gradleArg=-Dorg.gradle.jvmargs=-Xmx2048m

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 宝宝起名APP-APK
          path: temp-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
