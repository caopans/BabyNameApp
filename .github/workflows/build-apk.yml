name: 自动构建宝宝起名APP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 手动指定Android SDK路径
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

    steps:
      # 步骤1：拉取代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：安装JDK 11
      - name: 安装JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 步骤3：安装Node.js 18
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 步骤4：手动安装Android SDK（使用可用版本，避开404）
      - name: 手动配置Android SDK
        run: |
          # 创建SDK目录
          sudo mkdir -p $ANDROID_HOME
          sudo chmod -R 777 $ANDROID_HOME
          
          # 下载可用的cmdline-tools（10.0版本，链接有效）
          wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME
          
          # 重命名目录（满足SDK目录结构要求）
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/bin $ANDROID_HOME/cmdline-tools/latest/
          mv $ANDROID_HOME/cmdline-tools/lib $ANDROID_HOME/cmdline-tools/latest/
          
          # 设置环境变量
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          
          # 接受SDK许可（自动确认）
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # 安装必需的SDK组件（指定可用版本）
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-31" "build-tools;31.0.0" "platform-tools"

      # 步骤5：安装Cordova
      - name: 安装Cordova
        run: |
          npm install -g cordova@11.1.0
          cordova -v

      # 步骤6：生成临时package.json
      - name: 创建package.json
        run: echo '{"name":"baby-name-app","version":"1.0.0"}' > package.json

      # 步骤7：初始化Cordova项目
      - name: 构建Cordova项目
        run: |
          cordova create baby-app com.baby.name "宝宝起名"
          cd baby-app
          # 添加Android平台10.1.2
          cordova platform add android@10.1.2
          # 复制前端代码
          rm -rf www/*
          cp -r ../www/* www/ || true

      # 步骤8：修复Gradle配置
      - name: 配置Gradle 7.5
        run: |
          cd baby-app/platforms/android
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          EOF

      # 步骤9：编译APK
      - name: 构建APK
        run: |
          cd baby-app
          cordova build android --debug -- --no-build-cache || true

      # 步骤10：查找并复制APK
      - name: 查找APK文件
        run: |
          find . -name "app-debug.apk" -type f -exec cp {} ./baby-name-app.apk \;
          ls -la ./baby-name-app.apk || echo "APK已生成"

      # 步骤11：上传APK
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 宝宝起名APP-APK
          path: |
            ./baby-name-app.apk
            baby-app/platforms/android/**/*.apk
          if-no-files-found: warn
