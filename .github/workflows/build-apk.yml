name: 自动构建宝宝起名APP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 关键修复1：安装JDK 17（Android 构建必需）
      - name: 安装JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 关键修复2：配置Android SDK环境（自动下载所需版本）
      - name: 配置Android SDK
        uses: android-actions/setup-android@v3

      # 安装Node.js
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 安装Cordova
      - name: 安装Cordova
        run: npm install -g cordova

      # 关键修复3：手动设置Android SDK路径（解决Cordova找不到SDK的问题）
      - name: 配置环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_ENV

      # 构建Cordova项目（简化命令，降低出错概率）
      - name: 构建Cordova项目
        run: |
          # 创建项目并复制文件
          cordova create temp-app com.babynamer.app "宝宝起名"
          cp config.xml temp-app/
          rm -rf temp-app/www/*
          cp -r www/* temp-app/www/
          cd temp-app
          
          # 关键修复4：指定低版本Android平台（兼容性更好）
          cordova platform add android@11.0.0
          
          # 仅安装核心插件（移除易冲突的分享插件）
          cordova plugin add cordova-plugin-nativestorage cordova-plugin-statusbar

      # 关键修复5：强制指定Gradle版本（解决Gradle兼容问题）
      - name: 修复Gradle配置
        run: |
          cd temp-app/platforms/android
          # 写入Gradle兼容配置
          echo "android {
              compileSdkVersion 33
              buildToolsVersion '33.0.2'
              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 33
              }
              namespace 'com.babynamer.app'
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > build.gradle

      # 编译APK（添加--verbose便于排查错误）
      - name: 编译APK
        run: |
          cd temp-app
          cordova build android --debug --verbose

      # 上传APK
      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: 宝宝起名APP-APK
          path: temp-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
