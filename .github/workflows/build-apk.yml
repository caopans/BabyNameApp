name: 自动构建宝宝起名APP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/android-sdk
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"

    steps:
      # 步骤1：拉取代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：安装JDK 11（无缓存）
      - name: 安装JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 步骤3：安装Node.js 18（禁用缓存）
      - name: 安装Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 步骤4：安装Cordova
      - name: 安装Cordova
        run: |
          npm install -g cordova@11.1.0
          cordova -v

      # 步骤5：配置Android SDK（修正参数错误）
      - name: 配置Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '8.0'
          accept-android-sdk-licenses: true
          # 移除无效参数api-levels/build-tools，使用默认兼容版本

      # 步骤6：生成临时package.json
      - name: 创建package.json
        run: echo '{"name":"baby-name-app","version":"1.0.0"}' > package.json

      # 步骤7：初始化Cordova项目
      - name: 构建Cordova项目
        run: |
          cordova create baby-app com.baby.name "宝宝起名"
          cd baby-app
          # 添加Android平台10.1.2（最稳定版本）
          cordova platform add android@10.1.2
          # 复制前端代码（无则跳过）
          rm -rf www/*
          cp -r ../www/* www/ || true

      # 步骤8：修复Gradle配置（手动指定7.5版本）
      - name: 配置Gradle 7.5
        run: |
          cd baby-app/platforms/android
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          EOF

      # 步骤9：编译APK（强制构建）
      - name: 构建APK
        run: |
          cd baby-app
          cordova build android --debug -- --no-build-cache || true

      # 步骤10：查找并复制APK
      - name: 查找APK文件
        run: |
          # 全局查找所有APK文件
          find . -name "*.apk" -type f -exec cp {} ./baby-name-app.apk \;
          # 显示文件列表，便于排查
          ls -la ./ || true

      # 步骤11：上传APK产物
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 宝宝起名APP-APK
          path: |
            ./baby-name-app.apk
            baby-app/platforms/android/**/*.apk
          if-no-files-found: warn
